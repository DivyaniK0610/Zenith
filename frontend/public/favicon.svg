<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1c1812"/>
      <stop offset="100%" stop-color="#0c0a08"/>
    </linearGradient>
    <linearGradient id="g1" x1="8" y1="14" x2="40" y2="14" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d4954a"/>
      <stop offset="100%" stop-color="#a06828"/>
    </linearGradient>
    <linearGradient id="g2" x1="8" y1="24" x2="40" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c07830"/>
      <stop offset="100%" stop-color="#8a5218"/>
    </linearGradient>
    <linearGradient id="g3" x1="8" y1="34" x2="40" y2="34" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a05e20"/>
      <stop offset="100%" stop-color="#6a3e10"/>
    </linearGradient>
  </defs>

  <!-- Background pill -->
  <rect width="48" height="48" rx="12" fill="url(#bg)"/>

  <!-- Three horizontal stacked slabs — the "slate" concept -->
  <!-- Top slab (brightest) -->
  <rect x="10" y="11" width="28" height="7" rx="3.5" fill="url(#g1)" opacity="0.95"/>

  <!-- Middle slab (slightly inset) -->
  <rect x="13" y="21" width="22" height="6" rx="3" fill="url(#g2)" opacity="0.85"/>

  <!-- Bottom slab (most inset, dimmest) -->
  <rect x="16" y="30" width="16" height="5" rx="2.5" fill="url(#g3)" opacity="0.7"/>

  <!-- Top-edge highlight shimmer on top slab -->
  <rect x="10" y="11" width="28" height="1" rx="0.5" fill="white" opacity="0.12"/>
</svg>
