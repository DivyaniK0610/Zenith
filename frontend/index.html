<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!--
      theme-color is set to the DARK background by default.
      The inline script below + ThemeColorSync in App.jsx keep it
      in sync whenever the user toggles light/dark.
    -->
    <meta name="theme-color" content="#0c0a08" id="theme-color-meta" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Slate" />
    <meta name="description" content="Build streaks. Earn XP. Get coached by AI that knows your data." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Slate</title>
    <!--
      Anti-FOUC: apply theme BEFORE React renders.
      Also immediately sets the correct theme-color so the status bar
      never flashes the wrong colour on load.
    -->
    <script>
      (function () {
        var DARK_BG  = '#0c0a08';
        var LIGHT_BG = '#eceae6';

        try {
          var saved = localStorage.getItem('slate_theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var useDark = saved ? saved === 'dark' : prefersDark;

          if (!useDark) {
            document.documentElement.setAttribute('data-theme', 'light');
          }

          // Set the theme-color immediately — before React hydrates
          var meta = document.getElementById('theme-color-meta');
          if (meta) meta.setAttribute('content', useDark ? DARK_BG : LIGHT_BG);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/sw.js', { scope: '/' })
            .then(reg => console.log('[SW] Slate registered:', reg.scope))
            .catch(err => console.warn('[SW] Registration failed:', err));
        });
      }
    </script>
  </body>
</html>
